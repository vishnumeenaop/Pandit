@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap');

*{
    font-family:'Rajdhani',sans-serif;
}

body{
    min-height:100vh;
    width:100vw;
    position:relative;
    overflow-y:scroll;
    overflow-x: hidden;
    background:#000;
}

/* 🏏 CRICKET STADIUM GRADIENT - REDDISH THEME */
.cricket-bg{
    background:linear-gradient(
        135deg,
        #1a0000 0%,
        #4d0000 30%,
        #800000 60%,
        #b30000 100%
    );
    background-size:400% 400%;
    animation:stadiumPulse 15s ease infinite;
}

@keyframes stadiumPulse{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* PITCH LINES PATTERN */
.pitch-pattern{
    position:absolute;
    inset:0;
    background:
        repeating-linear-gradient(
            90deg,
            transparent,
            transparent 80px,
            rgba(255,255,255,0.03) 80px,
            rgba(255,255,255,0.03) 82px
        );
    z-index:1;
}

/* FLOATING CRICKET ELEMENTS */
.floating-elements{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:2;
}

.cricket-element{
    position:absolute;
    opacity:.15;
    animation:cricketFloat 20s ease-in-out infinite;
}

.cricket-element:nth-child(1){
    font-size:120px;
    top:5%;
    left:5%;
    animation-delay:0s;
}

.cricket-element:nth-child(2){
    font-size:90px;
    top:50%;
    right:8%;
    animation-delay:7s;
}

.cricket-element:nth-child(3){
    font-size:100px;
    bottom:15%;
    left:50%;
    animation-delay:14s;
}

@keyframes cricketFloat{
    0%,100%{transform:translate(0,0) rotate(0deg)}
    33%{transform:translate(20px,-30px) rotate(15deg)}
    66%{transform:translate(-30px,20px) rotate(-10deg)}
}

/* CARD STADIUM GLOW - RED */
.stadium-glow{
    box-shadow:
        0 0 80px rgba(255, 0, 0, 0.4),
        0 20px 60px rgba(255, 100, 100, 0.2),
        inset 0 0 60px rgba(0,0,0,.3);
}

/* AVATAR SPOTLIGHT - RED/GOLD */
.avatar-spotlight{
    box-shadow:
        0 0 100px rgba(255, 0, 0, 0.8),
        0 0 60px rgba(255,200,0,.6),
        0 20px 40px rgba(0,0,0,.5);
    animation:spotlight 2.5s ease-in-out infinite;
}

@keyframes spotlight{
    0%,100%{
        box-shadow:
            0 0 100px rgba(255, 0, 0, 0.8),
            0 0 60px rgba(255,200,0,.6);
    }
    50%{
        box-shadow:
            0 0 140px rgba(255, 100, 0, 1),
            0 0 90px rgba(255,255,255,.8);
    }
}

/* SCOREBOARD BUTTON - RED/ORANGE GRADIENT */
.scoreboard-btn{
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg, #ff0000 0%, #ff4d4d 100%);
    text-transform:uppercase;
    letter-spacing:2px;
    font-family:'Bebas Neue',sans-serif;
}

.scoreboard-btn::before{
    content:'';
    position:absolute;
    inset:0;
    left:-100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.4),
        transparent
    );
    animation:scoreShimmer 2s infinite;
}

@keyframes scoreShimmer{
    from{left:-100%}
    to{left:200%}
}

/* FEATURE ICONS BOUNCE */
.feature-icon{
    transition:all .4s cubic-bezier(.68,-.55,.265,1.55);
}

.feature-item:hover .feature-icon{
    transform:scale(1.3) translateY(-5px);
}

/* GLASS EFFECT WITH RED TINT */
.cricket-glass{
    background:rgba(30, 0, 0, 0.75);
    backdrop-filter:blur(20px);
    border:2px solid rgba(255, 0, 0, 0.3);
    border-radius:24px;
}

/* TELEGRAM CRICKET ICON - RED */
.telegram-cricket{
    background:linear-gradient(135deg, #cc0000 0%, #ff3333 100%);
    animation:cricketBounce 1.5s ease-in-out infinite;
}

@keyframes cricketBounce{
    0%,100%{transform:translateY(0) scale(1)}
    50%{transform:translateY(-8px) scale(1.08)}
}

/* SCOREBOARD NUMBERS */
.scoreboard-num{
    font-family:'Bebas Neue',sans-serif;
    text-shadow:0 4px 12px rgba(255, 50, 50, 0.6);
}

/* LIVE BADGE PULSE */
.live-pulse{
    animation:livePulse 1.5s ease-in-out infinite;
}

@keyframes livePulse{
    0%,100%{opacity:1; transform:scale(1)}
    50%{opacity:.7; transform:scale(1.15)}
}

/* ENERGY BARS */
.energy-bar{
    height:4px;
    background:linear-gradient(90deg, transparent, #ff3333, transparent);
    animation:energyFlow 2s linear infinite;
}

@keyframes energyFlow{
    from{background-position:-200px 0}
    to{background-position:200px 0}
}
</style>
